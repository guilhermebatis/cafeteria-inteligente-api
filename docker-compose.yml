version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: cafeteria_db
      POSTGRES_USER: cafeteria_user
      POSTGRES_PASSWORD: cafeteria_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://cafeteria_user:cafeteria_password@db:5432/cafeteria_db
      SECRET_KEY: django-insecure-dev-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    env_file:
    - .env.example

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000

    ports:
      - "3000:3000"

    depends_on:
      - backend

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data: